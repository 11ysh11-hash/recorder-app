<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>즐거운 리코더 교실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 선생님의 원본 코드를 브라우저가 인식할 수 있는 형태로 정리했습니다.
        const { useState, useEffect, useRef } = React;

        const NOTE_DATA = {
            '솔': { yPos: 40, fingers: [0, 1, 2, 3], color: 'bg-emerald-600', freq: 392.00 },
            '라': { yPos: 33, fingers: [0, 1, 2], color: 'bg-emerald-600', freq: 440.00 },
            '시': { yPos: 26, fingers: [0, 1], color: 'bg-emerald-600', freq: 493.88 },
            '낮은 도': { yPos: 82, fingers: [0, 1, 2, 3, 4, 5, 6, 7], color: 'bg-blue-600', freq: 261.63 },
            '낮은 레': { yPos: 75, fingers: [0, 1, 2, 3, 4, 5, 6], color: 'bg-blue-600', freq: 293.66 },
            '낮은 미': { yPos: 68, fingers: [0, 1, 2, 3, 4, 5], color: 'bg-blue-600', freq: 329.63 },
            '낮은 파': { yPos: 61, fingers: [0, 1, 2, 3, 4, 6, 7], color: 'bg-blue-600', freq: 349.23 }
        };

        const App = () => {
            const [selectedNote, setSelectedNote] = useState('솔');

            return (
                <div className="max-w-4xl mx-auto p-8">
                    <header className="text-center mb-10">
                        <h1 className="text-5xl font-black text-slate-800 mb-4">즐거운 리코더 교실</h1>
                        <p className="text-xl text-slate-500 font-bold">특수학급 학생들을 위한 맞춤형 학습 도구</p>
                    </header>

                    <div className="flex gap-10 bg-white p-10 rounded-[50px] shadow-2xl border-4 border-blue-50">
                        {/* 운지법 영역 */}
                        <div className="w-64 bg-orange-50 p-8 rounded-[40px] flex flex-col items-center border-2 border-orange-100">
                            <div className="mb-6 flex items-center gap-4">
                                <span className="font-bold text-slate-400">뒤</span>
                                <div className={`w-10 h-10 rounded-full border-4 ${NOTE_DATA[selectedNote].fingers.includes(0) ? 'bg-blue-600 border-blue-800' : 'bg-white border-slate-200'}`}></div>
                            </div>
                            <div className="flex flex-col gap-3">
                                {[1, 2, 3, 4, 5, 6, 7].map(f => (
                                    <div key={f} className={`w-10 h-10 rounded-full border-4 flex items-center justify-center font-bold ${NOTE_DATA[selectedNote].fingers.includes(f) ? 'bg-blue-600 border-blue-800 text-white' : 'bg-white border-slate-200 text-slate-300'}`}>
                                        {f}
                                    </div>
                                ))}
                            </div>
                            <div className="mt-8 text-5xl font-black text-blue-600 bg-white px-8 py-4 rounded-3xl shadow-inner border-2 border-blue-100">
                                {selectedNote.replace('낮은 ', '')}
                            </div>
                        </div>

                        {/* 버튼 영역 */}
                        <div className="flex-1 grid grid-cols-2 gap-4">
                            {Object.keys(NOTE_DATA).map(note => (
                                <button 
                                    key={note}
                                    onClick={() => setSelectedNote(note)}
                                    className={`h-24 rounded-3xl text-2xl font-bold transition-all active:scale-95 ${selectedNote === note ? 'bg-blue-600 text-white shadow-xl translate-y-1' : 'bg-slate-100 text-slate-600 hover:bg-white border-2 border-transparent hover:border-blue-200'}`}
                                >
                                    {note}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
